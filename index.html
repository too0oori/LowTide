<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LowTide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form id="mood-form">
        <select id="mood" name="mood">
            <option value="High Tide">High Tide</option>
            <option value="Low Tide">Low Tide</option>
            <option value="Calm Waters">Calm Waters</option>
            <option value="Rough Seas">Rough Seas</option>
            <option value="Stormy Seas">Stormy Seas</option>
        </select>

        <select id="energy" name="energy">
            <option value="overload">Overload</option>
            <option value="high">Expansion</option>
            <option value="medium">Maintenance</option>
            <option value="low">Restoration</option>
        </select>

        <select id="focus" name="focus">
            <option value="work">Work</option>
            <option value="social">Social</option>
            <option value="self-care">Self-Care</option>
            <option value="hobbies">Hobbies</option>
        </select>

        <button type="submit">Submit</button>
    </form>

    <div id="entries"></div>


    <script src="script.js"></script>
</body>
</html>
