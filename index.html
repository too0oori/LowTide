<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LowTide</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>

    <main class="app">

        <header class="hero">
            <h1 class="hero-title">LowTide</h1>
            <p class="hero-text">
                A soft emotional check-in space for tracking your inner tides.
            </p>
        </header>

        <!-- MOOD -->

        <section class="section">
            <h2 class="section-title">Mood</h2>

            <div class="mood-selector">

                <label class="mood-card high-tide">
                    <input type="radio" name="mood" value="High Tide" hidden>

                    <span class="card-title">High Tide</span>

                    <span class="card-desc">
                        Energized and motivated. Great time to tackle big things.
                    </span>
                </label>

                <label class="mood-card low-tide">
                    <input type="radio" name="mood" value="Low Tide" hidden>

                    <span class="card-title">Low Tide</span>

                    <span class="card-desc">
                        Drained and unmotivated. Good time to focus on self-care and recharge.
                    </span>
                </label>

                <label class="mood-card calm-waters">
                    <input type="radio" name="mood" value="Calm Waters" hidden>

                    <span class="card-title">Calm Waters</span>

                    <span class="card-desc">
                        Feeling balanced, steady, and in a good place.
                    </span>
                </label>

                <label class="mood-card rough-seas">
                    <input type="radio" name="mood" value="Rough Seas" hidden>

                    <span class="card-title">Rough Seas</span>

                    <span class="card-desc">
                        Feeling overwhelmed and emotionally turbulent.
                    </span>
                </label>

                <label class="mood-card stormy-seas">
                    <input type="radio" name="mood" value="Stormy Seas" hidden>

                    <span class="card-title">Stormy Seas</span>

                    <span class="card-desc">
                        Anxiety, uncertainty, and emotional instability.
                    </span>
                </label>

            </div>
        </section>

        <!-- ENERGY -->

        <section class="section">
            <h2 class="section-title">Energy</h2>

            <div class="energy-selector">

                <label class="energy-card overload">
                    <input type="radio" name="energy" value="Overload" hidden>

                    <span class="card-title">Overload</span>

                    <span class="card-desc">
                        Too much on your plate. Running on fumes.
                    </span>
                </label>

                <label class="energy-card expansion">
                    <input type="radio" name="energy" value="Expansion" hidden>

                    <span class="card-title">Expansion</span>

                    <span class="card-desc">
                        Full of momentum and ready to grow.
                    </span>
                </label>

                <label class="energy-card maintenance">
                    <input type="radio" name="energy" value="Maintenance" hidden>

                    <span class="card-title">Maintenance</span>

                    <span class="card-desc">
                        Stable, grounded, and moving steadily.
                    </span>
                </label>

                <label class="energy-card restoration">
                    <input type="radio" name="energy" value="Restoration" hidden>

                    <span class="card-title">Restoration</span>

                    <span class="card-desc">
                        Low energy. Your body and mind need recovery.
                    </span>
                </label>

            </div>
        </section>

        <!-- NEEDS -->

        <section class="section">
            <h2 class="section-title">Current Needs</h2>

            <div class="needs-selector">

                <label class="need-card need-rest">
                    <input type="radio" name="need" value="Rest" hidden>

                    <span class="card-title">Rest</span>

                    <span class="card-desc">
                        Time alone to reset and recharge.
                    </span>
                </label>

                <label class="need-card need-connection">
                    <input type="radio" name="need" value="Connection" hidden>

                    <span class="card-title">Connection</span>

                    <span class="card-desc">
                        Emotional closeness and support from others.
                    </span>
                </label>

                <label class="need-card need-structure">
                    <input type="radio" name="need" value="Structure" hidden>

                    <span class="card-title">Structure</span>

                    <span class="card-desc">
                        Order, routine, and predictability.
                    </span>
                </label>

                <label class="need-card need-solitude">
                    <input type="radio" name="need" value="Solitude" hidden>

                    <span class="card-title">Solitude</span>

                    <span class="card-desc">
                        Quiet distance from stimulation and noise.
                    </span>
                </label>

            </div>
        </section>

        <!-- SLEEP -->
        <section class="section">

        </section>

        <!-- SLEEP -->
        <section class="section">

            <h2 class="section-title">Sleep</h2>

            <div class="sleep-selector">

                <label class=" sleep-card sleep-restless">
                    <input type="radio" name="sleep" value="Restless" hidden>

                    <span class="card-title">Restless</span>

                    <span class="card-desc">
                        Difficulty falling or staying asleep.
                    </span>
                </label>

                <label class="sleep-card sleep-restful">
                    <input type="radio" name="sleep" value="Restful" hidden>

                    <span class="card-title">Restful</span>

                    <span class="card-desc">
                        Deep, uninterrupted sleep.
                    </span>
                </label>

            </div>
        </section>

        <!--SOCIAL BATTERY-->
        <section class="section">

            <h2 class="section-title">Social Battery</h2>

            <div class="socialbattery-selector">

                <label class="socialbattery-card battery-depleted">
                    <input type="radio" name="socialbattery" value="Depleted" hidden>

                    <span class="card-title">Depleted</span>

                    <span class="card-desc">
                        Feeling drained from social interactions.
                    </span>
                </label>

                <label class="socialbattery-card battery-recharged">
                    <input type="radio" name="socialbattery" value="Recharged" hidden>

                    <span class="card-title">Recharged</span>

                    <span class="card-desc">
                        Feeling energized and refreshed by social connections.
                    </span>
                </label>

            </div>
        </section>

        <!-- NOTES -->

        <section class="notes-section">

            <h2 class="section-title">Notes</h2>

            <textarea
                id="notes"
                placeholder="Write your thoughts here..."
            ></textarea>

        </section>

        <!-- ENTRIES -->

        <section class="entries-section">

            <h2 class="section-title">Entries</h2>

            <div id="entries"></div>

        </section>

        <button id="save-btn">Save Entry</button>

    </main>

    <script src="script.js"></script>

</body>
</html>
